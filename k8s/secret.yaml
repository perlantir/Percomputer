apiVersion: v1
kind: Secret
metadata:
  name: multi-model-agent-platform-secrets
  namespace: multi-model-agent-platform
  labels:
    app.kubernetes.io/name: multi-model-agent-platform
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials - CHANGE THESE BEFORE DEPLOYING
  DB_HOST: "postgres.multi-model-agent-platform.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "agent_platform"
  DB_USER: "agent_platform_user"
  DB_PASSWORD: "change-me-in-production"
  DATABASE_URL: "postgresql://agent_platform_user:change-me-in-production@postgres.multi-model-agent-platform.svc.cluster.local:5432/agent_platform?sslmode=require"

  # LLM API Keys - CHANGE THESE BEFORE DEPLOYING
  OPENAI_API_KEY: "sk-change-me"
  ANTHROPIC_API_KEY: "sk-ant-change-me"
  GEMINI_API_KEY: "change-me"
  COHERE_API_KEY: "change-me"

  # Redis - CHANGE THESE BEFORE DEPLOYING
  REDIS_URL: "redis://redis.multi-model-agent-platform.svc.cluster.local:6379/0"
  REDIS_PASSWORD: "change-me"

  # Authentication - CHANGE THESE BEFORE DEPLOYING
  JWT_SECRET: "change-me-to-a-256-bit-secret"
  API_KEY_SALT: "change-me"

  # Observability - CHANGE THESE BEFORE DEPLOYING
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
