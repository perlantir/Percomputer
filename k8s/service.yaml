apiVersion: v1
kind: Service
metadata:
  name: multi-model-agent-platform
  namespace: multi-model-agent-platform
  labels:
    app.kubernetes.io/name: multi-model-agent-platform
    app.kubernetes.io/component: api
  annotations:
    description: "Service for the Multi-Model Agent Platform API"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multi-model-agent-platform
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: None
  publishNotReadyAddresses: false
