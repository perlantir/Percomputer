apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-model-agent-platform-config
  namespace: multi-model-agent-platform
  labels:
    app.kubernetes.io/name: multi-model-agent-platform
    app.kubernetes.io/component: config
data:
  APP_NAME: "Multi-Model Agent Platform"
  APP_ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  HTTP_PORT: "8080"
  HTTP_TIMEOUT: "30s"
  HTTP_MAX_BODY_SIZE: "10MB"
  METRICS_ENABLED: "true"
  METRICS_PORT: "8080"
  METRICS_PATH: "/metrics"
  CORS_ENABLED: "true"
  CORS_ORIGINS: "*"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  LLM_DEFAULT_MODEL: "gpt-4"
  LLM_MAX_TOKENS: "4096"
  LLM_TIMEOUT: "60s"
  LLM_RETRY_ATTEMPTS: "3"
  LLM_RETRY_BACKOFF: "2s"
  AGENT_MAX_CONCURRENT: "50"
  AGENT_TIMEOUT: "120s"
  CACHE_ENABLED: "true"
  CACHE_TTL: "300"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
  DB_MAX_OPEN_CONNS: "25"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: "3600"
