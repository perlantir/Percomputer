# =================================================================
# Nginx Reverse Proxy — Multi-Model Agent Platform
# =================================================================
# Features:
#   • SSL/TLS termination with HSTS
#   • Brotli + gzip compression
#   • Rate limiting (per IP, per zone)
#   • Security headers (CSP, X-Frame-Options, etc.)
#   • Structured JSON access logging
#   • Health check endpoint
#   • WebSocket upgrade support
#   • Static asset caching
# =================================================================

# -----------------------------------------------------------------
# 1. Rate Limit Zones
# -----------------------------------------------------------------
# Limit API requests: 100 r/m per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

# Limit auth endpoints: 10 r/m per IP (stricter)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Limit upload endpoints: 5 r/m per IP
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn:10m;

# -----------------------------------------------------------------
# 2. Upstreams
# -----------------------------------------------------------------
upstream app_backend {
    least_conn;
    server 127.0.0.1:3000 weight=5 max_fails=3 fail_timeout=30s;
    # Add additional backend servers here:
    # server 127.0.0.1:3001 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

upstream metrics_backend {
    server 127.0.0.1:9090;
    keepalive 32;
}

# -----------------------------------------------------------------
# 3. SSL Configuration (shared)
# -----------------------------------------------------------------
# Mozilla SSL Configuration Generator — Intermediate profile
# https://ssl-config.mozilla.org/
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;

# -----------------------------------------------------------------
# 4. Structured Log Format (JSON)
# -----------------------------------------------------------------
log_format json_combined escape=json '{"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_host":"$http_host",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"ssl_protocol":"$ssl_protocol",'
    '"ssl_cipher":"$ssl_cipher",'
    '"rate_limit_status":"$limit_req_status",'
    '"connection_requests":$connection_requests}';

# -----------------------------------------------------------------
# 5. Compression (Brotli + Gzip)
# -----------------------------------------------------------------
# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# Brotli (requires ngx_brotli module)
brotli on;
brotli_comp_level 5;
brotli_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

# -----------------------------------------------------------------
# 6. Global Security Headers Map
# -----------------------------------------------------------------
map $request_uri $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;";
}

# -----------------------------------------------------------------
# 7. HTTP → HTTPS Redirect
# -----------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------
# 8. Main HTTPS Server
# -----------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name <YOUR_DOMAIN> www.<YOUR_DOMAIN>;

    # SSL certificates
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_trusted_certificate /etc/nginx/ssl/ca.crt;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;
    add_header Content-Security-Policy $csp_header always;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Connection Limiting ──────────────────────────────────────
    limit_conn conn 50;

    # ── Body Limits ──────────────────────────────────────────────
    client_max_body_size 100m;
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;

    # ── Timeouts ─────────────────────────────────────────────────
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Proxy Defaults ───────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_cache_bypass                 $http_upgrade;

    # Hide server version
    server_tokens off;

    # ── Static Assets (cache aggressively) ──────────────────────
    location /assets/ {
        alias /var/www/app/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    location /static/ {
        alias /var/www/app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Favicon & robots (lightweight)
    location = /favicon.ico {
        alias /var/www/app/static/favicon.ico;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        alias /var/www/app/static/robots.txt;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        log_not_found off;
    }

    # ── Health Check (bypass rate limits) ───────────────────────
    location /health {
        access_log off;
        proxy_pass http://app_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Readiness Probe ─────────────────────────────────────────
    location /ready {
        access_log off;
        proxy_pass http://app_backend/ready;
        proxy_set_header Host $host;
    }

    # ── App Metrics — Prometheus scrape target (restricted access) ──
    location /api/metrics {
        allow 10.0.0.0/8;      # Private network
        allow 172.16.0.0/12;   # Private network
        allow 127.0.0.1;       # Localhost
        deny all;

        proxy_pass http://app_backend/api/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Prometheus UI (restricted access) ───────────────────────
    location /prometheus/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://metrics_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Upload Endpoint (strict rate limit) ──────────────────────
    location /api/v1/upload {
        limit_req zone=upload burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://app_backend;
    }

    # ── Auth Endpoints (strict rate limit) ─────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://app_backend;
    }

    # ── WebSocket Endpoint ──────────────────────────────────────
    location /ws/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API Endpoints (general rate limit) ──────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://app_backend;
    }

    # ── Default: all other requests ─────────────────────────────
    location / {
        proxy_pass http://app_backend;
    }

    # ── Custom Error Pages ──────────────────────────────────────
    error_page 429 /429.html;
    location = /429.html {
        root /var/www/app/errors;
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/app/errors;
        internal;
    }
}

# -----------------------------------------------------------------
# 9. Map for Connection Upgrade (WebSocket support)
# -----------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
