# ============================================================
# Prometheus Configuration
# Scrape targets for Agent Platform monitoring
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: agent-platform
    replica: "{{.ExternalURL}}"

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load alerting rules
rule_files:
  - "alerts.yml"

scrape_configs:
  # --------------------------------------------------
  # Prometheus Self-Monitoring
  # --------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s

  # --------------------------------------------------
  # Next.js Application
  # --------------------------------------------------
  - job_name: "agent-platform-app"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: /api/metrics
    scrape_interval: 15s
    scrape_timeout: 5s

  # --------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 15s

  # --------------------------------------------------
  # Redis
  # --------------------------------------------------
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 15s

  # --------------------------------------------------
  # NATS
  # --------------------------------------------------
  - job_name: "nats"
    static_configs:
      - targets: ["nats:8222"]
    metrics_path: /varz
    scrape_interval: 15s

  # --------------------------------------------------
  # cAdvisor (Container Metrics)
  # --------------------------------------------------
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 15s

  # --------------------------------------------------
  # Node Exporter (Host Metrics)
  # --------------------------------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # --------------------------------------------------
  # Blackbox - HTTP Health Probes
  # --------------------------------------------------
  - job_name: "blackbox-app"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:3000/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: "blackbox-postgres"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: "blackbox-redis"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - redis:6379
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  # --------------------------------------------------
  # Loki (Log metrics)
  # --------------------------------------------------
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
    scrape_interval: 30s