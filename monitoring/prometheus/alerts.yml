# ============================================================
# Prometheus Alert Rules
# Agent Platform Critical & Warning Alerts
# ============================================================

groups:
  - name: agent-platform-critical
    rules:
      # Service Down Alerts
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."

      # App Health Check Failed
      - alert: AppHealthCheckFailed
        expr: probe_success{job="blackbox-app"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App health check failed"
          description: "The app health endpoint at {{ $labels.instance }} has been failing for 2+ minutes."

      # High Error Rate
      - alert: HighHTTPErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(http_requests_total[5m])) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate (>10%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # High Latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP latency (p95 > 2s)"
          description: "95th percentile latency is {{ $value }}s."

  - name: database-alerts
    rules:
      # PostgreSQL Connection Pool Near Limit
      - alert: PostgreSQLHighConnections
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool >80%"
          description: "PostgreSQL is using {{ $value | humanizePercentage }} of max connections."

      # PostgreSQL Down
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter cannot reach the database."

      # High Rollback Rate
      - alert: PostgreSQLHighRollbackRate
        expr: |
          rate(pg_stat_database_xact_rollback[5m])
          /
          (rate(pg_stat_database_xact_commit[5m]) + rate(pg_stat_database_xact_rollback[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL high rollback rate"
          description: "Rollback rate is {{ $value | humanizePercentage }}."

  - name: cache-alerts
    rules:
      # Redis Down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter cannot reach Redis server."

      # Low Cache Hit Rate
      - alert: RedisLowHitRate
        expr: |
          (redis_keyspace_hits_total / (redis_keyspace_hits_total + redis_keyspace_misses_total)) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis cache hit rate <50%"
          description: "Current hit rate is {{ $value | humanizePercentage }}."

      # Redis Memory Near Limit
      - alert: RedisMemoryNearLimit
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage >90%"
          description: "Redis is using {{ $value | humanizePercentage }} of max memory."

  - name: resource-alerts
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: |
          rate(container_cpu_usage_seconds_total{name=~"agent-platform-.*"}[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage for {{ $labels.name }}"
          description: "CPU usage is {{ $value | humanizePercentage }}."

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (container_memory_usage_bytes{name=~"agent-platform-.*"}
          / container_spec_memory_limit_bytes{name=~"agent-platform-.*"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage for {{ $labels.name }}"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space <10%"
          description: "Root filesystem has {{ $value | humanizePercentage }} free space."