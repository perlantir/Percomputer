# ============================================================
# Grafana Datasource Provisioning
# Auto-configures Prometheus and Loki on startup
# ============================================================

apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Loki
    orgId: 1

datasources:
  # --------------------------------------------------
  # Prometheus - Primary metrics source
  # --------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      cacheLevel: 'High'

  # --------------------------------------------------
  # Loki - Log aggregation source
  # --------------------------------------------------
  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: loki
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "TraceID"
          matcherRegex: "trace_id=(\\w+)"
          url: "$$${__value.raw}"
          datasourceUid: prometheus