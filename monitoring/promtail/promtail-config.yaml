# ============================================================
# Promtail Configuration
# Ships Docker container logs to Loki
# ============================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # --------------------------------------------------
  # Docker Container Logs
  # --------------------------------------------------
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            container_name: "name"
            service_name: "service_name"
      - timestamp:
          source: time
          format: RFC3339Nano
      - labels:
          stream:
          container_name:
          service_name:
      - output:
          source: output

  # --------------------------------------------------
  # System Logs (optional)
  # --------------------------------------------------
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log