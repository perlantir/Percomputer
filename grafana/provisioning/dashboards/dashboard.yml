# ============================================================
# Grafana Dashboard Provisioning
# Auto-discoves dashboard JSON files on startup
# ============================================================

apiVersion: 1

providers:
  - name: 'Agent Platform Dashboards'
    orgId: 1
    folder: 'Agent Platform'
    folderUid: 'agent-platform'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
